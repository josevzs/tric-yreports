<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ─────────────────────────────────────────────────── -->
    <title>EasyExpense — Tricount expense reports, AI-categorized</title>
    <meta name="description" content="Free tool to turn your Tricount export into a clean expense report. AI-categorized, downloadable as PDF, Markdown, Excel or CSV. Upload .xlsx or paste a share link." />
    <meta name="author" content="josevzs" />
    <meta name="theme-color" content="#000000" />

    <!-- ── Open Graph (WhatsApp, Facebook, LinkedIn previews) ───────────── -->
    <!-- REPLACE YOURDOMAIN.COM with your actual domain before deploying -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://YOURDOMAIN.COM/" />
    <meta property="og:title" content="EasyExpense — Tricount expense reports, AI-categorized" />
    <meta property="og:description" content="Upload your Tricount export or paste a share link. AI categorizes expenses automatically. Download as PDF, Markdown, Excel or CSV. Free &amp; open source." />
    <meta property="og:image" content="https://YOURDOMAIN.COM/og-image.svg" />

    <!-- ── Twitter / X Card ────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EasyExpense" />
    <meta name="twitter:description" content="Turn your Tricount export into a clean expense report — AI-categorized, PDF-ready." />
    <meta name="twitter:image" content="https://YOURDOMAIN.COM/og-image.svg" />

    <!-- ── Canonical ───────────────────────────────────────────────────── -->
    <!-- REPLACE YOURDOMAIN.COM with your actual domain -->
    <link rel="canonical" href="https://YOURDOMAIN.COM/" />

    <!-- ── Icons ───────────────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />

    <!-- ── Fonts ───────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- ── Analytics (Plausible — no cookies, no consent banner needed) ── -->
    <!-- REPLACE YOURDOMAIN.COM with your actual domain, then uncomment   -->
    <!-- Sign up at https://plausible.io to get your tracking script      -->
    <!-- <script defer data-domain="YOURDOMAIN.COM" src="https://plausible.io/js/script.js"></script> -->

    <!-- ── Theme init (prevents flash) ─────────────────────────────────── -->
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
